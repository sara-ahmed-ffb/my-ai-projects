<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cognitive System</title>
    <style>
        :root {
            --bg-color: #090d16;
            --panel-bg: rgba(15, 23, 42, 0.75);
            --primary: #00f2fe;
            --primary-dark: #042f4e;
            --accent: #4facfe;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --border: rgba(0, 242, 254, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* الخلفية المتحركة الذكية */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(79, 172, 254, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.08) 0%, transparent 40%),
                linear-gradient(to right, rgba(255,255,255,0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            z-index: 1;
            animation: backgroundPulse 12s ease-in-out infinite alternate;
        }

        @keyframes backgroundPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* حاوية الشات الرئيسية */
        .chat-container {
            width: 90%;
            max-width: 650px;
            height: 85vh;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 242, 254, 0.05), inset 0 1px 2px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 2;
            animation: containerAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes containerAppear {
            0% { opacity: 0; transform: translateY(20px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* الهيدر */
        .chat-header {
            padding: 20px 25px;
            background: rgba(9, 13, 22, 0.6);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(0, 242, 254, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 254, 0); }
        }

        .chat-header span {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .system-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            background: var(--primary-dark);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            letter-spacing: 1px;
        }

        /* منطقة الرسائل */
        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* تخصيص الـ Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.1);
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 242, 254, 0.25);
        }

        /* بنية الرسائل وحركاتها */
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.98rem;
            word-wrap: break-word;
            animation: messageFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes messageFadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: #042f4e;
            font-weight: 500;
            align-self: flex-start;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.15);
        }

        .bot-message {
            background: rgba(30, 41, 59, 0.7);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.05);
            align-self: flex-end;
            border-bottom-left-radius: 4px;
        }

        .system-message {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            align-self: center;
            font-size: 0.85rem;
            text-align: center;
            border-radius: 10px;
            padding: 8px 16px;
        }

        /* منطقة الإدخال */
        .chat-input-area {
            padding: 20px;
            background: rgba(9, 13, 22, 0.6);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 18px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 0.98rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: #042f4e;
            border: none;
            padding: 0 24px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.15);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: #1e293b;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-title-area">
            <div class="status-dot"></div>
            <span>نظام المعالجة الذكي | AI Cognitive System</span>
        </div>
        <div class="system-badge">Secure Node</div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">تم تهيئة البيئة بنجاح الرقمية. في انتظار التعليمات البرمجية لتمريرها عبر العقدة...</div>
    </div>
    
    <div class="chat-input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="اكتبي استفساركِ أو الأمر البرمجي هنا..." onkeypress="handleKeyPress(event)">
        </div>
        <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function appendMessage(text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
        return msgDiv;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user-message');
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        const botDiv = appendMessage('جاري الاتصال بالعقدة...', 'bot-message');

        try {
            const response = await fetch('http://127.0.0.1:5000/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // الجزء الناقص نحتفظ به للـ chunk الجاي

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const data = line.slice(6).trim();
                    if (!data || data === '[DONE]') continue;
                    // نضع النص الكامل الجديد مباشرة
                    botDiv.innerText = data.replace(/\\n/g, '\n');
                    chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
                }
            }
        } catch (error) {
            botDiv.className = 'message system-message';
            botDiv.innerText = `خطأ: ${error.message}`;
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
    }
</script>
</body>
</html>
